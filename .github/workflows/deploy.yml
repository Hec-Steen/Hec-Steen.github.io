name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Required for mkdocs-material social cards (imaging extra)
      - name: Install OS dependencies
        run: sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Cache MkDocs
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ hashFiles('uv.lock') }}
          path: .cache
          restore-keys: mkdocs-material-

      - name: Install dependencies
        run: pip install "mkdocs-material[imaging]" mkdocs-glightbox mkdocs-rss-plugin pycairo

      - name: Deploy
        run: mkdocs gh-deploy --force
